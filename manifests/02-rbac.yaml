apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-api-sa
  namespace: security-guardian
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-pod-reader
rules:
- apiGroups: [""]
  resources: ["pods", "services", "networkpolicies"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: read-pods-global-binding
subjects:
- kind: ServiceAccount
  name: security-api-sa
  namespace: security-guardian
roleRef:
  kind: ClusterRole
  name: cluster-pod-reader
  apiGroup: rbac.authorization.k8s.io